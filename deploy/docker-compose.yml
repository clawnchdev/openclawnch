# OpenClawnch — Docker Compose self-hosting
#
# Run your own OpenClawnch instance without Fly.io. Supports Telegram,
# Discord, Slack, or any channel OpenClaw provides.
#
# Quick start:
#   1. Copy .env.example to .env and fill in your keys
#   2. docker compose up -d
#   3. For Telegram: set webhook to https://your-domain/telegram-webhook
#   4. For Discord: provide DISCORD_TOKEN in .env
#
# The container uses a named volume for persistent state (wallet sessions,
# conversation history, onboarding progress, plan schedules).

services:
  openclawnch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclawnch
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=1536
    volumes:
      - openclawnch-data:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/healthz"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 5

volumes:
  openclawnch-data:
    driver: local
