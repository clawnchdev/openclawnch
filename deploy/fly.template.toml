# OpenClawnch Telegram — Fly.io configuration
# Generated by: npx openclawnch deploy
#
# Key settings:
#   auto_stop_machines = "suspend"  — sub-1s wake (memory snapshot)
#   auto_start_machines = true      — Fly wakes machine on webhook delivery
#   min_machines_running = 0        — no cost when idle

app = "{{APP_NAME}}"
primary_region = "{{REGION}}"

[build]
  image = "ghcr.io/openclawnch/telegram:latest"

[env]
  NODE_ENV = "production"

# Fly auto-stop handles idle management.
# Machine suspends after ~5 min of no HTTP traffic.
# Resumes automatically when Telegram delivers a webhook.
# "suspend" preserves memory → sub-1s wake vs 2-5s for "stop".
[http_service]
  internal_port = 18789
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

[mounts]
  source = "workspace"
  destination = "/workspace"
