# OpenClawnch — Fly.io configuration template
#
# SETUP:
#   1. cp fly.template.toml fly.toml
#   2. Replace YOUR_APP_NAME below with your chosen app name
#   3. Replace YOUR_REGION with your preferred region (ewr, lax, lhr, etc.)
#   4. Run: fly apps create YOUR_APP_NAME
#   5. Run: fly volumes create workspace --region YOUR_REGION --size 1 -a YOUR_APP_NAME
#   6. Set secrets (see README), then: fly deploy --local-only

app = "YOUR_APP_NAME"
primary_region = "YOUR_REGION"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

# Fly auto-stop handles idle management.
# Machine suspends after ~5 min of no HTTP traffic.
# Resumes automatically when Telegram delivers a webhook.
# "suspend" preserves memory -> sub-1s wake vs 2-5s for "stop".
[http_service]
  internal_port = 18789
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

# For always-on mode (no suspend), uncomment these and comment the above:
# [http_service]
#   internal_port = 18789
#   force_https = true
#   auto_stop_machines = "off"
#   auto_start_machines = true
#   min_machines_running = 1

[[services.http_checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "60s"
  method = "GET"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

# For better performance (compound ops, heavy usage), use:
# [[vm]]
#   size = "shared-cpu-2x"
#   memory = "2048mb"

[mounts]
  source = "workspace"
  destination = "/workspace"
