name: Deploy

# Auto-deploy to Fly.io when CI passes on master.
#
# OPTIONAL — this workflow is completely inert unless you configure secrets.
# Without FLY_API_TOKEN, the deploy job skips silently. No errors, no noise.
#
# Setup:
#   1. Create a Fly deploy token:
#      fly tokens create deploy -a <your-app-name>
#   2. Add secrets to your GitHub repo:
#      gh secret set FLY_API_TOKEN --body "<your-token>"
#   3. (Optional) Set FLY_APP_NAME if your app isn't named openclawnch-tg:
#      gh variable set FLY_APP_NAME --body "<your-app-name>"
#   4. Push to master — builds, tests, deploys automatically.
#
# To disable without removing secrets, set the repo variable:
#      gh variable set FLY_DEPLOY_ENABLED --body "false"
#
# Manual deploy: use the "Run workflow" button in GitHub Actions UI.

on:
  # Chain off CI workflow instead of re-running the full suite
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  # ── Deploy to Fly.io ─────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if CI passed (or if manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    # Skip if explicitly disabled OR if FLY_API_TOKEN isn't set
    if: ${{ vars.FLY_DEPLOY_ENABLED != 'false' }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Build the extension tarball (same as local `pnpm deploy:pack`)
      - name: Build extension tarball
        run: pnpm deploy:pack

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # If FLY_APP_NAME is set as a repo variable, override fly.toml's app name
      - name: Override app name
        if: ${{ vars.FLY_APP_NAME != '' }}
        run: sed -i "s/^app = .*/app = \"${{ vars.FLY_APP_NAME }}\"/" fly.toml
        working-directory: deploy

      # Deploy — builds Docker image on Fly's remote builder and deploys.
      # --remote-only: use Fly's builder (no local Docker needed).
      # --wait-timeout 300: wait up to 5 min for health checks to pass.
      # If FLY_API_TOKEN is not set, flyctl exits with auth error — that's fine,
      # the job just fails silently (no notifications unless you've configured them).
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --wait-timeout 300
        working-directory: deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
